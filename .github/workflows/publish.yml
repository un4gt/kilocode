name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  contents: write

jobs:
  build-vscode:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: ./.github/actions/setup-bun

      - name: Compute version
        id: version
        run: bun ./script/compute-version.ts
        env:
          KILO_BUMP: ${{ inputs.bump }}
          KILO_VERSION: ${{ inputs.version }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}

      - name: Install @vscode/vsce
        run: bun install -g @vscode/vsce

      - name: Build CLI binaries
        run: bun script/build.ts
        working-directory: ./packages/opencode
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}
          GH_REPO: ${{ github.repository }}

      - name: Build VSIX packages
        run: bun script/build.ts
        working-directory: ./packages/kilo-vscode
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}
          GH_REPO: ${{ github.repository }}
          KILO_REQUIRE_ALL_TARGETS: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: kilocode-lite-vsix
          path: packages/kilo-vscode/out

  publish:
    needs: build-vscode
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          name: kilocode-lite-vsix
          path: packages/kilo-vscode/out

      - name: Publish GitHub release (VSIX only)
        run: bun ./script/publish-vsix.ts
        env:
          KILO_BUMP: ${{ inputs.bump }}
          KILO_VERSION: ${{ needs.build-vscode.outputs.version }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
